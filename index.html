<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA FORECAST</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0077ff;
            --danger: #ff0055;
            --bg: #050508;
            --card: rgba(22, 22, 30, 0.8);
            --text: #e0e0e0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Rajdhani', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 119, 255, 0.05) 0%, transparent 40%);
            color: var(--text);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 15px; }

        .header { text-align: center; margin-bottom: 5px; }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem; letter-spacing: 4px; margin: 0;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .control-card {
            background: var(--card);
            padding: 20px; border-radius: 28px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column; gap: 15px;
        }

        .section-title {
            font-size: 0.75rem; letter-spacing: 2px;
            color: var(--primary); font-weight: 700;
            text-transform: uppercase; margin-bottom: 5px;
            display: flex; align-items: center; gap: 8px;
        }

        .section-title::after { content: ''; height: 1px; flex-grow: 1; background: rgba(255,255,255,0.1); }

        /* Segmented Selector para 2 opciones */
        .mode-selector {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            padding: 4px; border-radius: 18px;
            display: grid; grid-template-columns: 1fr 1fr;
            position: relative; 
        }

        .mode-btn {
            background: none; border: none; color: rgba(255, 255, 255, 0.4);
            padding: 12px 0; font-size: 0.8rem; font-weight: 700;
            cursor: pointer; border-radius: 14px; transition: all 0.3s;
            text-transform: uppercase; z-index: 1;
        }

        .mode-btn.active { color: #fff; text-shadow: 0 0 10px var(--primary); }

        .glider {
            position: absolute; height: calc(100% - 8px); width: calc(50% - 4px);
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 14px; top: 4px; left: 4px;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        /* Actuadores */
        .dynamic-section {
            transition: opacity 0.4s;
            opacity: 0; display: none;
        }

        .label-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .label-row span { font-size: 0.9rem; color: rgba(255,255,255,0.7); }
        .label-row .val { color: var(--primary); font-weight: 700; font-family: 'Orbitron'; font-size: 1rem; }

        input[type=range] {
            width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.05);
            height: 6px; border-radius: 5px; outline: none; margin-top: 5px; margin-bottom: 5px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 26px; width: 26px; border-radius: 50%;
            background: #fff; border: 3px solid var(--primary); cursor: pointer;
        }

        /* Toggle Switch iOS style */
        .toggle-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,0,85,0.05); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,0,85,0.2); }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider.round {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 34px;
        }
        .slider.round:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider.round { background-color: var(--danger); }
        input:checked + .slider.round:before { transform: translateX(24px); }

        #alertBox {
            background: rgba(255, 0, 85, 0.1); border: 1px solid var(--danger);
            border-radius: 12px; padding: 8px; color: var(--danger);
            font-size: 0.75rem; font-weight: 700; text-align: center;
            display: none; animation: pulse 1.5s infinite; letter-spacing: 1px;
        }

        /* Botón Ejecutar */
        .btn-apply {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; font-family: 'Orbitron', sans-serif;
            font-size: 1rem; font-weight: 700; letter-spacing: 2px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s; margin-top: 5px;
        }
        .btn-apply:active { transform: scale(0.97); }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SISTEMA FORECAST</h1>
            <p>PANEL DE CONTROL CENTRAL</p>
        </div>

        <!-- SECCIÓN 1: CONTROL OPERATIVO (BIT 0) -->
        <div class="control-card">
            <div class="section-title">CONTROL OPERATIVO</div>
            <div class="mode-selector" id="ctl-btns">
                <div id="glider-ctl" class="glider"></div>
                <button class="mode-btn active" onclick="setControlMode(0)">AUTOMÁTICO</button>
                <button class="mode-btn" onclick="setControlMode(1)">MANUAL</button>
            </div>

            <div id="actuatorsSec" class="dynamic-section">
                <div>
                    <div class="label-row"><span>Riego (Válvula)</span><span id="vVal" class="val">0°</span></div>
                    <input type="range" id="vSlider" min="0" max="90" value="0" oninput="updateVal('v')">
                </div>
                <div style="height: 10px;"></div>
                <div>
                    <div class="label-row"><span>Aire (Compuerta)</span><span id="cVal" class="val">0°</span></div>
                    <input type="range" id="cSlider" min="0" max="90" value="0" oninput="updateVal('c')">
                </div>
            </div>
        </div>

        <!-- SECCIÓN 2: DEEPSLEEP (BITS 1 y 2) -->
        <div class="control-card">
            <div class="section-title">GESTIÓN DE DEEPSLEEP</div>
            <div class="mode-selector" id="ds-btns">
                <div id="glider-ds" class="glider"></div>
                <button class="mode-btn active" onclick="setSleepMode(0)">NORMAL</button>
                <button class="mode-btn" onclick="setSleepMode(1)">PERSONALIZADO</button>
            </div>

            <div id="sleepSec" class="dynamic-section" style="flex-direction: column; gap: 15px;">
                <!-- TIEMPO PERSONALIZADO -->
                <div>
                    <div class="label-row"><span>Duración del DeepSleep</span><span id="sVal" class="val">120 min</span></div>
                    <input type="range" id="sSlider" min="0" max="360" step="1" value="120" oninput="updateVal('s')">
                </div>

                <!-- OVERRIDE FORZADO -->
                <label class="toggle-row">
                    <span style="font-size: 0.85rem; font-weight: 700; color: #ff4d82; text-transform: uppercase;">Activar Forzado Inmediato</span>
                    <div class="switch">
                        <input type="checkbox" id="forceCheck" onchange="toggleWarning()">
                        <span class="slider round"></span>
                    </div>
                </label>
                <div id="alertBox">⚠️ EJECUCIÓN CRÍTICA: APAGADO DE MOTORES ACTIVO</div>
            </div>
        </div>

        <button class="btn-apply" onclick="apply()">ENVIAR COMANDO BINARIO</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#050508';

        let modeControl = 0; // 0: Auto, 1: Manual
        let modeSleep = 0;   // 0: Normal, 1: Personalizado

        function setControlMode(m) {
            modeControl = m;
            document.getElementById('glider-ctl').style.transform = m === 0 ? 'translateX(0)' : 'translateX(100%)';
            
            const btns = document.querySelectorAll('#ctl-btns .mode-btn');
            btns[0].classList.toggle('active', m === 0);
            btns[1].classList.toggle('active', m === 1);

            const sec = document.getElementById('actuatorsSec');
            if (m === 1) {
                sec.style.display = 'block';
                setTimeout(() => sec.style.opacity = 1, 10);
            } else {
                sec.style.opacity = 0;
                setTimeout(() => sec.style.display = 'none', 300);
            }
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }

        function setSleepMode(m) {
            modeSleep = m;
            document.getElementById('glider-ds').style.transform = m === 0 ? 'translateX(0)' : 'translateX(100%)';
            
            const btns = document.querySelectorAll('#ds-btns .mode-btn');
            btns[0].classList.toggle('active', m === 0);
            btns[1].classList.toggle('active', m === 1);

            const sec = document.getElementById('sleepSec');
            if (m === 1) {
                sec.style.display = 'flex';
                setTimeout(() => sec.style.opacity = 1, 10);
            } else {
                sec.style.opacity = 0;
                setTimeout(() => sec.style.display = 'none', 300);
            }
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }

        function toggleWarning() {
            const isForced = document.getElementById('forceCheck').checked;
            document.getElementById('alertBox').style.display = isForced ? 'block' : 'none';
        }

        function updateVal(type) {
            const slider = document.getElementById(type + 'Slider');
            const display = document.getElementById(type + 'Val');
            const suffix = (type === 'v' ? '°' : (type === 'c' ? '°' : ' min'));
            display.innerText = slider.value + suffix;
        }

        function apply() {
            let flags = 0;
            // -- BIT 0: MANUAL
            if (modeControl === 1) flags |= (1 << 0);
            
            // -- BITS 1 (FORCED) y 2 (UPDATE_SP)
            if (modeSleep === 1) {
                flags |= (1 << 2); // F_UPDATE_SLEEP_SP: Siempre que sea personalizado, es un nuevo default
                // Si el toggle "Forzado Inmediato" está prendido:
                if (document.getElementById('forceCheck').checked) {
                    flags |= (1 << 1); // F_FORCE_SLEEP
                }
            }

            // Convertimos minutos seleccionados a SEGUNDOS para el backend
            const minutes = parseInt(document.getElementById('sSlider').value);
            const seconds = modeSleep === 1 ? (minutes * 60) : 0;

            const data = {
                flags: flags,
                v: parseInt(document.getElementById('vSlider').value),
                c: parseInt(document.getElementById('cSlider').value),
                s: seconds
            };

            const btn = document.querySelector('.btn-apply');
            btn.innerText = "SINCRO...";
            btn.style.opacity = "0.6";

            setTimeout(() => {
                tg.sendData(JSON.stringify(data));
                tg.close();
            }, 600);
        }
    </script>
</body>
</html>
